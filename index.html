<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer-to-Peer Cinema</title>
    <meta name="description" content="Decentralized P2P cinema using WebTorrent and GUN.js">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(255, 255, 255, 0.05);
            --accent-color: #e50914;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism primitives */
        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        /* Basic Layout */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(8px);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            color: var(--accent-color);
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-link.active {
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-color);
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .card {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-info {
            margin-top: 0.5rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* MultiRange Styles */
        .range-slider {
            position: relative;
            width: 100%;
            height: 5px;
            background: #444;
            border-radius: 5px;
            margin: 15px 0 25px;
        }
        .range-slider input[type="range"] {
            position: absolute;
            left: 0;
            top: -7px; /* Centering 18px thumb on 5px track: (18-5)/2 = 6.5 */
            width: 100%;
            background: none;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            z-index: 2;
        }
        .range-slider input[type="range"]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            pointer-events: auto;
            cursor: pointer;
            -webkit-appearance: none;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        /* Firefox Support */
        .range-slider input[type="range"]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            pointer-events: auto;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .range-slider .range-track {
            position: absolute;
            height: 100%;
            background: var(--accent-color);
            border-radius: 5px;
        }

        /* Single Range Styles */
        input[type="range"].single-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 5px;
            background: #444;
            border-radius: 5px;
            outline: none;
            margin: 15px 0;
        }
        input[type="range"].single-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        input[type="range"].single-range::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Preact and htm from CDN -->
    <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.19.2",
        "preact/hooks": "https://esm.sh/preact@10.19.2/hooks",
        "htm": "https://esm.sh/htm@3.1.1",
        "gun": "https://esm.sh/gun@0.2020.1239",
        "webtorrent": "./webtorrent.min.js"
      }
    }
    </script>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
